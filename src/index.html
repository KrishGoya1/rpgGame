<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TopDown Game</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* prevent page scroll on arrow/WASD */
      background: #121212;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    #game-container {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: radial-gradient(1200px 800px at 50% 50%, #1d1d1d, #0e0e0e);
    }
    canvas {
      /* Sharper pixel look for placeholders and low-res textures */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      outline: none;
      box-shadow: 0 10px 30px rgba(0,0,0,.45);
      border-radius: 14px;
    }
    /* On small screens, keep canvas fully visible with letterboxing */
    @media (max-width: 960px), (max-height: 540px) {
      canvas {
        width: min(96vw, 960px);
        height: calc(min(96vw, 960px) * (540/960));
        max-height: 96vh;
        max-width: calc(96vh * (960/540));
      }
    }
  </style>
</head>
<body>
  <div id="game-container" tabindex="1" aria-label="Game canvas"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
